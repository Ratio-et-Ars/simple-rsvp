services:
  rsvp:
    # Build locally, or swap `build: .` for the published image:
    #   image: ghcr.io/ratio-et-ars/simple-rsvp:latest
    build: .
    container_name: rsvp-app
    ports:
      - "8080:3022"
    environment:
      # Required. Set ADMIN_PASSWORD in your shell or a .env file before
      # `docker compose up`; the app refuses to start without it.
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
    volumes:
      - app_data:/app/data
    restart: unless-stopped

volumes:
  app_data:
