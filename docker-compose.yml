services:
  rsvp:
    # Build locally, or swap `build: .` for the published image:
    #   image: ghcr.io/ratio-et-ars/simple-rsvp:latest
    build: .
    container_name: rsvp-app
    ports:
      - "8080:3022"
    environment:
      # CHANGE THIS before exposing the app to the internet.
      ADMIN_PASSWORD: "letmein"
    volumes:
      - app_data:/app/data
    restart: unless-stopped

volumes:
  app_data:
